	<script type="text/javascript">
		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};


        </script>

## Parallelism v/s Concurrency

##### Parallelism -- many tasks executing at the same time

##### Concurrency -- many tasks in-flight at the same time

#### _Parallelism `$\Rightarrow$` Concurrency_
#### _Concurrency `$\nRightarrow$` Parallelism_
</div>

<aside class="notes"><ul>
<li>Concurrency v/s Parallelism example: One person juggling many tasks, many people each handling one task at a time.</li>
</ul>

## Async-Await

#### Concurrency framework
- Single threaded<sup id="fnref:1" role="doc-noteref">1</sup>, Single process

## Async-Await

#### Key Concepts -- Task Queue
- Task(fn, is_ready) -- bock of un-interrupted compute
- fn: the computation to perform, may return a result or continuing task.
- is_ready: true if all dependencies are available, false otherwise.<sup id="fnref:2" role="doc-noteref">1</sup>


<div class="footnotes" role="doc-endnotes">
<ol>
<li id="fn:2" role="doc-endnote" class="footnote"><p>

Usually implemented as a state machine/multiple queues.

</p></li></ol>
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Async-Await

#### Key Concepts -- Event Loop
- Event loop is to tasks what scheduler is to threads.
- Manages Task lifecycle
    1. moves tasks to correct queues, and
    2. picks what's the next task to run (usually FIFO).
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Async-Await

#### Key Concepts -- Event Loop

```python
while True:
    # Get the next ready Task.
    task = task_queue.pop_first_ready_task()

    # Let the task Execute, it could either complete or run partway and give up execution.
    continuation = task.fn()

    if continuation:
        # The task gave up control, let it continue later.
        task_queue.push(continuation)
    ...
```
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Async-Await


|                      | Async-Await          | Multi-Threaded                 | Multi-Processing                       |
| -------------------- | -------------------- | ------------------------------ | -------------------------------------- |
| Resource Requirement | Very Light           | Light                          | Heavy                                  |
| Data-sharing         | Easy                 | Thread Safety/Locking Required | Shared Memory Setup + Locking Required |
| Concurrency<sup id="fnref:3" role="doc-noteref">1</sup>| > 1000 (RAM bounded) | ~ 100s (CPU Thread bounded)    | < ~ 100s (CPU core bounded)            |
| Parallelism          | No<sup id="fnref:4" role="doc-noteref">2</sup>| Yes                            | Yes                                    |
| Best usage Scenario  | IO bound workloads   | CPU bound                      | CPU bound + sparse sharing             |

<li id="fn:3" role="doc-endnote" class="footnote"><p>

Mostly comparing consumer hardware

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
